<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e24 0%, #2a2a35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #00d2ff;
        }

        .error-message {
            background: rgba(255, 75, 75, 0.15);
            border-left: 4px solid #ff4b4b;
            color: #ff4b4b;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b3b3b3;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.13);
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d2ff 0%, #0072ff 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #b3b3b3;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #00d2ff;
        }

        /* =======================================
           FIXED RESPONSIVE CODES
        ======================================= */
        @media screen and (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            h2 {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }
            input {
                padding: 10px 14px;
                font-size: 15px;
            }
            button {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>

        <div id="pesan-error" class="error-message">
            Username atau Password salah!
        </div>

        <form id="loginForm" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <a href="index.html" class="back-link">Kembali ke Home</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            var pesanError = document.getElementById('pesan-error');

            if (user === "admin" && pass === "123") {
                window.location.href = "hal_utama.html";
            } else {
                pesanError.style.display = "block";
                document.getElementById('password').value = "";
            }
        });
    </script>

</body>
</html>
