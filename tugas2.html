<!DOCTYPE html>
<html>
<head>
    <title>Daftar Harga Kantin Kampus</title>

    <style>
        table {
            width: 75%;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: Verdana, sans-serif;
        }

        th, td {
            border: 1px solid #333333;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #3a91f4ce;
        }

        /* warna khusus promo */
        .promo {
            background-color: #7fecff;
        }
    </style>

</head>

<body>

<h2 style="text-align:center;">
    DAFTAR HARGA MENU KANTIN
</h2>

<table>

    <!-- Header -->
    <tr>
        <th rowspan="2">Kategori</th>
        <th rowspan="2">Nama Menu</th>
        <th rowspan="2">Harga</th>
        <th colspan="2">Paket Bundling</th>
    </tr>

    <tr>
        <th>Paket Hemat</th>
        <th>Paket Promo</th>
    </tr>

    <!-- Minuman -->
    <tr>
        <td rowspan="2">Minuman</td>
        <td>Joshua</td>
        <td>Rp 5.000</td>
        <td>Rp 10.000</td>
        <td class="promo">Rp 9.000</td>
    </tr>

    <tr>
        <td>Es Teh</td>
        <td>Rp 3.000</td>
        <td>Rp 5.000</td>
        <td class="promo">Rp 4.000</td>
    </tr>

    <!-- Makanan -->
    <tr>
        <td rowspan="2">Makanan</td>
        <td>Nasi Goreng</td>
        <td>Rp 10.000</td>
        <td>Rp 22.000</td>
        <td class="promo">Rp 18.000</td>
    </tr>

    <tr>
        <td>Mie Goreng</td>
        <td>Rp 8.000</td>
        <td>Rp 18.000</td>
        <td class="promo">Rp 21.000</td>
    </tr>

</table>

</body>
</html>
